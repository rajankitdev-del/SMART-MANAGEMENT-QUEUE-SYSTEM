<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&amp;family=Noto+Sans+Devanagari:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#93f7ba",
                    "primary": "#0047a9",
                    "secondary-fixed": "#ffdcc2",
                    "on-surface-variant": "#424654",
                    "on-primary": "#ffffff",
                    "surface-container": "#ebeef3",
                    "outline": "#737785",
                    "secondary-fixed-dim": "#ffb77a",
                    "secondary": "#8f4e00",
                    "inverse-on-surface": "#eef1f6",
                    "tertiary-container": "#007445",
                    "on-error": "#ffffff",
                    "background": "#f7f9ff",
                    "surface-dim": "#d7dadf",
                    "on-primary-container": "#dae2ff",
                    "on-primary-fixed-variant": "#00419d",
                    "on-surface": "#181c20",
                    "primary-fixed": "#d9e2ff",
                    "surface-container-lowest": "#ffffff",
                    "primary-container": "#0b5ed7",
                    "on-secondary-fixed": "#2e1500",
                    "on-secondary-fixed-variant": "#6d3a00",
                    "outline-variant": "#c2c6d6",
                    "surface-tint": "#0057cc",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#b0c6ff",
                    "surface-container-high": "#e5e8ee",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-container": "#93f7ba",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#f1f4f9",
                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "secondary-container": "#fe9832",
                    "inverse-primary": "#b0c6ff",
                    "surface": "#f7f9ff",
                    "surface-variant": "#e0e3e8",
                    "tertiary-fixed-dim": "#77da9f",
                    "on-background": "#181c20",
                    "on-secondary-container": "#683700",
                    "on-tertiary-fixed-variant": "#00522f",
                    "surface-container-highest": "#e0e3e8",
                    "tertiary": "#005934",
                    "on-primary-fixed": "#001945",
                    "inverse-surface": "#2d3135",
                    "on-tertiary-fixed": "#002110",
                    "surface-bright": "#f7f9ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter", "Noto Sans Devanagari"],
                    "body": ["Inter", "Noto Sans Devanagari"],
                    "label": ["Inter", "Noto Sans Devanagari"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tricolor-bg {
            background: linear-gradient(180deg, #FF9933 0%, #FFFFFF 50%, #198754 100%);
            background-attachment: fixed;
        }
        .scan-line {
            height: 2px;
            background: #fe9832;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 12px 2px #fe9832;
            animation: scan 3s infinite linear;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        .viewfinder-corner {
            width: 40px;
            height: 40px;
            border-color: #0b5ed7;
            position: absolute;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface tricolor-bg min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-4 h-16 bg-blue-700 dark:bg-blue-900 text-white">
<button class="mr-4 hover:bg-blue-800 dark:hover:bg-blue-700 p-2 rounded-xl scale-95 duration-150 ease-in-out flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-bold text-2xl tracking-tight text-white">Scan QR Code</h1>
</header>
<main class="pt-24 pb-32 px-6 flex flex-col items-center max-w-lg mx-auto">
<!-- Instruction Text -->
<div class="mb-10 text-center">
<h2 class="text-headline-lg font-black tracking-tight leading-tight mb-2">Point &amp; Scan</h2>
<p class="text-on-surface-variant text-body-lg font-medium">Point your camera at the QR code at the service location.</p>
</div>
<!-- Scanner UI -->
<div class="relative w-full aspect-square max-w-[320px] bg-black rounded-xl overflow-hidden shadow-2xl">
<!-- Mock Camera Feed -->
<img alt="Scanning interface mockup" class="w-full h-full object-cover opacity-60 grayscale" data-alt="Blurred grayscale view of a professional office reception desk with a queue management stand in a brightly lit modern lobby" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwL9J8zqIS3Nl56qvteQDkxLRoOg6Yf_7FsLcJ1DXSxIMSAeFs_kpxt6COQXCZZ7IKaBdMxreK5rw7NnUs_890DqCQKbwxuMZNOY-gO5Z1CJ6oVdG5yQrKl8c-kiT_IUz5O912yXwDXpLqfBrqyVYjT1Bc_uyDlGfFQLxM9RAY6rZgGnx-ZEMBDFl8sJW4hojpndc2zSa-plDHI2FDCogIxc3BuWJUzod8Ei1HUnOHP1mHBV4H5VNCHGR98AAEz9BNkFwucFUkrQ"/>
<!-- Scanning Animation Overlay -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-64 h-64 relative">
<!-- Corners -->
<div class="viewfinder-corner top-0 left-0 border-t-4 border-l-4 rounded-tl-lg"></div>
<div class="viewfinder-corner top-0 right-0 border-t-4 border-r-4 rounded-tr-lg"></div>
<div class="viewfinder-corner bottom-0 left-0 border-b-4 border-l-4 rounded-bl-lg"></div>
<div class="viewfinder-corner bottom-0 right-0 border-b-4 border-r-4 rounded-br-lg"></div>
<!-- Scan Line -->
<div class="scan-line"></div>
</div>
</div>
<!-- Flash Toggle -->
<button class="absolute bottom-4 right-4 bg-white/20 backdrop-blur-md p-3 rounded-full text-white hover:bg-white/40 transition-all">
<span class="material-symbols-outlined" data-icon="flashlight_on">flashlight_on</span>
</button>
</div>
<!-- Manual Entry Section -->
<div class="w-full mt-12 space-y-6">
<div class="text-center">
<span class="text-label-md uppercase tracking-widest text-on-surface-variant font-bold bg-white/30 backdrop-blur-xs px-2 py-0.5 rounded">Having trouble?</span>
</div>
<div class="space-y-2">
<label class="text-title-lg font-bold block ml-1" for="token-code">Enter code manually</label>
<div class="relative group">
<input class="w-full h-14 px-4 bg-white/90 backdrop-blur-sm border-none rounded-md text-body-lg focus:ring-2 focus:ring-primary shadow-sm outline outline-1 outline-outline-variant/30" id="token-code" placeholder="e.g. QS-8821" type="text"/>
<button class="absolute right-2 top-2 bottom-2 bg-primary-container text-white px-6 rounded-md font-semibold hover:bg-primary transition-colors flex items-center justify-center">
                        Go
                    </button>
</div>
</div>
<!-- Need Help Button -->
<button class="w-full h-14 mt-4 bg-white/90 backdrop-blur-sm text-on-surface font-bold text-lg rounded-md flex items-center justify-center gap-3 hover:bg-white border border-outline-variant/20 shadow-sm active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-icon="help_center">help_center</span>
                Need Help
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 pb-safe px-2 bg-blue-700 dark:bg-blue-900 text-white shadow-[0_-4px_24px_rgba(0,0,0,0.2)]">
<a class="flex flex-col items-center justify-center text-blue-200 py-2 hover:text-white transition-colors active:opacity-90" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] text-[12px] font-semibold uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-white/10 text-white rounded-xl py-2 px-4 scale-98 active:opacity-90" href="#">
<span class="material-symbols-outlined" data-icon="confirmation_number">confirmation_number</span>
<span class="font-['Inter'] text-[12px] font-semibold uppercase tracking-wider">My Token</span>
</a>
<a class="flex flex-col items-center justify-center text-blue-200 py-2 hover:text-white transition-colors active:opacity-90" href="#">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
<span class="font-['Inter'] text-[12px] font-semibold uppercase tracking-wider">Track</span>
</a>
<a class="flex flex-col items-center justify-center text-blue-200 py-2 hover:text-white transition-colors active:opacity-90" href="#">
<span class="material-symbols-outlined" data-icon="help_center">help_center</span>
<span class="font-['Inter'] text-[12px] font-semibold uppercase tracking-wider">Help</span>
</a>
</nav>
</body></html>
