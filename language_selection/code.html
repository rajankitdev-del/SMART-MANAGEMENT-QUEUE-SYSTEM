<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Queue Seva - Select Language</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&amp;family=Noto+Sans+Devanagari:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#93f7ba",
                    "primary": "#0047a9",
                    "secondary-fixed": "#ffdcc2",
                    "on-surface-variant": "#424654",
                    "on-primary": "#ffffff",
                    "surface-container": "#ebeef3",
                    "outline": "#737785",
                    "secondary-fixed-dim": "#ffb77a",
                    "secondary": "#8f4e00",
                    "inverse-on-surface": "#eef1f6",
                    "tertiary-container": "#007445",
                    "on-error": "#ffffff",
                    "background": "#f7f9ff",
                    "surface-dim": "#d7dadf",
                    "on-primary-container": "#dae2ff",
                    "on-primary-fixed-variant": "#00419d",
                    "on-surface": "#181c20",
                    "primary-fixed": "#d9e2ff",
                    "surface-container-lowest": "#ffffff",
                    "primary-container": "#0b5ed7",
                    "on-secondary-fixed": "#2e1500",
                    "on-secondary-fixed-variant": "#6d3a00",
                    "outline-variant": "#c2c6d6",
                    "surface-tint": "#0057cc",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#b0c6ff",
                    "surface-container-high": "#e5e8ee",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-container": "#93f7ba",
                    "on-error-container": "#93000a",
                    "surface-container-low": "#f1f4f9",
                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "secondary-container": "#fe9832",
                    "inverse-primary": "#b0c6ff",
                    "surface": "#f7f9ff",
                    "surface-variant": "#e0e3e8",
                    "tertiary-fixed-dim": "#77da9f",
                    "on-background": "#181c20",
                    "on-secondary-container": "#683700",
                    "on-tertiary-fixed-variant": "#00522f",
                    "surface-container-highest": "#e0e3e8",
                    "tertiary": "#005934",
                    "on-primary-fixed": "#001945",
                    "inverse-surface": "#2d3135",
                    "on-tertiary-fixed": "#002110",
                    "surface-bright": "#f7f9ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter", "Noto Sans Devanagari"],
                    "body": ["Inter", "Noto Sans Devanagari"],
                    "label": ["Inter", "Noto Sans Devanagari"]
            }
          },
        },
      }
    </script>
<style>
        body {
            background: linear-gradient(180deg, #FF9933 0%, #FFFFFF 50%, #198754 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="text-on-surface font-body flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-4 h-16 bg-blue-700 dark:bg-blue-900 text-white transition-all">
<div class="flex items-center gap-4 w-full">
<button class="material-symbols-outlined text-white hover:bg-blue-800 p-2 rounded-full duration-150 ease-in-out scale-95" data-icon="arrow_back">arrow_back</button>
<h1 class="font-['Inter'] font-bold text-2xl tracking-tight text-white">Queue Seva</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-32 px-6 max-w-2xl mx-auto w-full">
<!-- Editorial Header Section -->
<section class="mb-10 mt-4">
<h2 class="text-on-surface font-headline font-black text-4xl leading-tight tracking-tight mb-2">Choose your language</h2>
<p class="text-on-surface-variant text-lg leading-relaxed font-semibold bg-white/30 backdrop-blur-sm inline-block px-2 py-0.5 rounded">अपनी भाषा चुनें • ਆਪਣੀ ਭਾਸ਼ਾ ਚੁਣੋ</p>
</section>
<!-- Language List (Asymmetric / Editorial Layout) -->
<div class="space-y-4">
<!-- Language Card: Active/Selected State -->
<button class="w-full flex items-center justify-between p-6 bg-white/95 backdrop-blur-sm border-2 border-primary rounded-xl text-left transition-all active:scale-[0.98] shadow-md">
<div class="flex flex-col">
<span class="text-on-surface font-bold text-xl">English</span>
<span class="text-on-surface-variant text-sm">International Standard</span>
</div>
<div class="flex items-center justify-center h-8 w-8 rounded-full bg-primary text-white">
<span class="material-symbols-outlined text-[20px]" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<!-- Language Card: Default -->
<button class="w-full flex items-center justify-between p-6 bg-white/95 backdrop-blur-sm hover:bg-surface-container-low rounded-xl text-left transition-all border border-transparent shadow-md active:scale-[0.98]">
<div class="flex flex-col">
<span class="text-on-surface font-bold text-2xl font-headline">हिंदी (Hindi)</span>
<span class="text-on-surface-variant text-sm mt-1">भारत की राजभाषा</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="language">language</span>
</button>
<button class="w-full flex items-center justify-between p-6 bg-white/95 backdrop-blur-sm hover:bg-surface-container-low rounded-xl text-left transition-all border border-transparent shadow-md active:scale-[0.98]">
<div class="flex flex-col">
<span class="text-on-surface font-bold text-2xl font-headline">বাংলা (Bengali)</span>
<span class="text-on-surface-variant text-sm mt-1">Bengali</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="language">language</span>
</button>
<button class="w-full flex items-center justify-between p-6 bg-white/95 backdrop-blur-sm hover:bg-surface-container-low rounded-xl text-left transition-all border border-transparent shadow-md active:scale-[0.98]">
<div class="flex flex-col">
<span class="text-on-surface font-bold text-2xl font-headline">தமிழ் (Tamil)</span>
<span class="text-on-surface-variant text-sm mt-1">Tamil</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="language">language</span>
</button>
<button class="w-full flex items-center justify-between p-6 bg-white/95 backdrop-blur-sm hover:bg-surface-container-low rounded-xl text-left transition-all border border-transparent shadow-md active:scale-[0.98]">
<div class="flex flex-col">
<span class="text-on-surface font-bold text-2xl font-headline">తెలుగు (Telugu)</span>
<span class="text-on-surface-variant text-sm mt-1">Telugu</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="language">language</span>
</button>
</div>
<!-- Accessibility Note for Elderly -->
<div class="mt-12 p-6 bg-white/90 backdrop-blur-sm rounded-xl flex items-start gap-4 shadow-sm border border-outline-variant/20">
<span class="material-symbols-outlined text-secondary" data-icon="info">info</span>
<p class="text-on-surface-variant text-sm leading-relaxed">
            You can change this language at any time in the <strong>Help</strong> section after logging in. 
            (आप इसे बाद में <strong>सहायता</strong> सेक्शन में बदल सकते हैं)
        </p>
</div>
</main>
<!-- Fixed Action Bar (Non-Navigational Primary Action) -->
<div class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-md p-6 border-t border-outline-variant/10">
<div class="max-w-2xl mx-auto">
<button class="w-full h-14 bg-primary text-white font-bold text-lg rounded-xl shadow-lg hover:shadow-xl active:opacity-90 transition-all flex items-center justify-center gap-2 group">
            Save and Continue
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</body></html>
