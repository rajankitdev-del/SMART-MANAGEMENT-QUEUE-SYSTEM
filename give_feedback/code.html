<style>
        body {
            background: linear-gradient(180deg, #FF9933 0%, #FFFFFF 50%, #198754 100%);
            background-attachment: fixed;
            min-height: 100vh;

<body class="font-body text-on-surface pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-4 h-16 bg-blue-700 dark:bg-blue-900">
<button class="mr-4 text-white hover:bg-blue-800 dark:hover:bg-blue-700 scale-95 duration-150 ease-in-out p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-white dark:text-blue-100 font-['Inter'] font-bold text-2xl tracking-tight">Queue Seva</h1>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Editorial Header -->
<div class="mb-12 mt-4">
<h2 class="text-[2rem] font-headline font-extrabold leading-[1.2] text-primary tracking-tight">How was your experience today?</h2>
<p class="text-on-surface-variant mt-2 font-medium bg-white/30 backdrop-blur-sm inline-block px-1 rounded">Your feedback helps us build a more efficient digital infrastructure for every citizen.</p>
</div>
<!-- Feedback Card Container -->
<div class="space-y-8">
<!-- Rating Section -->
<section class="bg-white/90 backdrop-blur-sm p-8 rounded-xl shadow-md border border-outline-variant/30">
<label class="block text-secondary font-bold text-sm tracking-widest uppercase mb-6">Star Rating</label>
<div class="flex justify-between items-center max-w-sm">
<span class="material-symbols-outlined text-4xl text-secondary-container cursor-pointer" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-4xl text-secondary-container cursor-pointer" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-4xl text-secondary-container cursor-pointer" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-4xl text-secondary-container cursor-pointer" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-4xl text-surface-variant cursor-pointer" data-icon="star">star</span>
</div>
</section>
<!-- Tags Section -->
<section class="space-y-4">
<label class="block text-secondary font-bold text-sm tracking-widest uppercase ml-1">What worked well?</label>
<div class="flex flex-wrap gap-3">
<button class="px-6 py-4 bg-white/95 backdrop-blur-sm text-on-surface border border-outline-variant/30 rounded-xl font-semibold hover:bg-secondary-fixed transition-colors shadow-sm">
                        Ease of use
                    </button>
<button class="px-6 py-4 bg-white/95 backdrop-blur-sm text-on-surface border border-outline-variant/30 rounded-xl font-semibold hover:bg-secondary-fixed transition-colors shadow-sm">
                        Clear alerts
                    </button>
<button class="px-6 py-4 bg-white/95 backdrop-blur-sm text-on-surface border border-outline-variant/30 rounded-xl font-semibold hover:bg-secondary-fixed transition-colors shadow-sm">
                        Helpful staff
                    </button>
</div>
</section>
<!-- Comment Box -->
<section class="space-y-4">
<label class="block text-secondary font-bold text-sm tracking-widest uppercase ml-1">Additional details</label>
<div class="relative">
<textarea class="w-full h-40 bg-white/95 backdrop-blur-sm border-outline-variant/30 rounded-xl p-6 text-on-surface focus:ring-2 focus:ring-primary placeholder:text-outline-variant text-lg shadow-sm" placeholder="Tell us more about your visit..."></textarea>
</div>
</section>
<!-- Submit Action -->
<div class="pt-6">
<button class="w-full h-14 bg-primary-container text-white font-bold text-lg rounded-xl shadow-lg active:scale-[0.98] transition-all">
                    Submit Feedback
                </button>
</div>
</div>
<!-- Decorative Illustration Element -->
<div class="mt-16 flex justify-center">
<img alt="Professional civic service illustration" class="w-48 h-48 object-cover rounded-full mix-blend-multiply opacity-40 grayscale" data-alt="Abstract minimalist illustration of hands holding a star with soft blue and saffron background tones in a clean digital style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6mP5CSlT1qyJSxXIMl-y-QFpRagy2ovjH15Pebo_ey14taiunnvwsUirgyj5kzAotPtYs4xh1xNpZecO3Nx1fbGV0UQOXp1o2tJm3aZDmMYOamnczKysy_o-px0envJ9UsVgPOoFSv4MKV5UfuwEEoCrK8_MvgR00FOzeqpRjeOMot7uJvKfkC8m8RytWfFSEeNjzpURWlVdPNPTVG6LaJ57s0kl7UwRvXw8CZ0M-UXQbufI5bDoe9LnuOB4P56m5gLLAk2UwJw"/>

<a class="flex flex-col items-center justify-center text-blue-200 py-2 hover:text-white transition-colors scale-98 active:opacity-90" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] text-[12px] font-semibold uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-blue-200 py-2 hover:text-white transition-colors scale-98 active:opacity-90" href="#">
<span class="material-symbols-outlined" data-icon="confirmation_number">confirmation_number</span>
<span class="font-['Inter'] text-[12px] font-semibold uppercase tracking-wider">My Token</span>
</a>
<a class="flex flex-col items-center justify-center text-blue-200 py-2 hover:text-white transition-colors scale-98 active:opacity-90" href="#">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
<span class="font-['Inter'] text-[12px] font-semibold uppercase tracking-wider">Track</span>
</a>
<a class="flex flex-col items-center justify-center bg-white/10 text-white rounded-xl py-2 px-4 scale-98 active:opacity-90" href="#">
<span class="material-symbols-outlined" data-icon="help_center">help_center</span>
<span class="font-['Inter'] text-[12px] font-semibold uppercase tracking-wider">Help</span>
</a>
</nav>
